<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎵 Mystery Song</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent-dim: rgba(232,255,71,0.12);
    --text: #f0f0f0;
    --muted: #666;
    --radius: 16px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }

  /* Ambient glow background */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(232,255,71,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    width: 100%;
    max-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 32px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    position: relative;
  }

  .mystery-art {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .mystery-art::before {
    content: '';
    position: absolute;
    inset: 0;
    background: conic-gradient(from 0deg, transparent 0%, rgba(232,255,71,0.05) 30%, transparent 60%);
    animation: spin 8s linear infinite;
    border-radius: 50%;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .mystery-art .icon {
    font-size: 52px;
    z-index: 1;
    filter: grayscale(1);
    opacity: 0.4;
    transition: opacity 0.4s, filter 0.4s;
  }

  .mystery-art.playing .icon {
    opacity: 1;
    filter: none;
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .label-block {
    text-align: center;
  }
  .label-block .song-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .label-block .mystery-title {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.01em;
  }
  .label-block .hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .progress-track {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s linear;
  }
  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .btn-secondary {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 22px;
    cursor: pointer;
    transition: color 0.2s;
    padding: 4px;
    line-height: 1;
  }
  .btn-secondary:hover { color: var(--text); }

  .btn-play {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, background 0.2s;
    flex-shrink: 0;
  }
  .btn-play:hover { transform: scale(1.06); }
  .btn-play:active { transform: scale(0.96); }
  .btn-play svg { width: 26px; height: 26px; fill: #0a0a0a; }

  /* Volume */
  .volume-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .volume-row span { font-size: 16px; color: var(--muted); }
  .volume-row input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .volume-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  /* Error state */
  .error-msg {
    display: none;
    background: rgba(255,80,80,0.08);
    border: 1px solid rgba(255,80,80,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 12px;
    color: #ff8080;
    text-align: center;
    width: 100%;
    line-height: 1.6;
  }

  /* Waveform animation bars */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .waveform.active { opacity: 1; }
  .waveform span {
    display: block;
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
  }
  .waveform span:nth-child(1) { animation-delay: 0s; }
  .waveform span:nth-child(2) { animation-delay: 0.1s; }
  .waveform span:nth-child(3) { animation-delay: 0.2s; }
  .waveform span:nth-child(4) { animation-delay: 0.1s; }
  .waveform span:nth-child(5) { animation-delay: 0s; }
  @keyframes wave {
    0%, 100% { height: 6px; }
    50% { height: 18px; }
  }

  .footer-note {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="card">
  <div class="mystery-art" id="artDisc">
    <span class="icon">🎵</span>
  </div>

  <div class="label-block">
    <div class="song-num" id="songNum">SONG #—</div>
    <div class="mystery-title">MYSTERY TRACK</div>
    <div class="hint">Can you name this song?</div>
  </div>

  <div class="waveform" id="waveform">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="progress-wrap">
    <div class="progress-track" id="progressTrack">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="time-row">
      <span id="timeElapsed">0:00</span>
      <span id="timeDuration">0:00</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn-secondary" id="btnRestart" title="Restart">↺</button>
    <button class="btn-play" id="btnPlay" aria-label="Play">
      <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="btn-secondary" id="btnMute" title="Mute">🔊</button>
  </div>

  <div class="volume-row">
    <span>🔈</span>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1"/>
    <span>🔊</span>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="footer-note">🤫 No peeking — write your guess!</div>
</div>

<audio id="audioEl" preload="auto"></audio>

<script>
  const params = new URLSearchParams(window.location.search);
  const songId = params.get('id') || '01';
  const src = params.get('src'); // direct audio URL

  const audio = document.getElementById('audioEl');
  const btnPlay = document.getElementById('btnPlay');
  const iconPlay = document.getElementById('iconPlay');
  const progressFill = document.getElementById('progressFill');
  const progressTrack = document.getElementById('progressTrack');
  const timeElapsed = document.getElementById('timeElapsed');
  const timeDuration = document.getElementById('timeDuration');
  const waveform = document.getElementById('waveform');
  const artDisc = document.getElementById('artDisc');
  const errorMsg = document.getElementById('errorMsg');
  const volumeSlider = document.getElementById('volumeSlider');

  document.getElementById('songNum').textContent = 'SONG #' + String(songId).padStart(2, '0');

  // Set audio source from URL param
  if (src) {
    audio.src = decodeURIComponent(src);
  } else {
    showError('No song source provided. Check the QR code was generated correctly.');
  }

  function formatTime(s) {
    if (isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2, '0');
  }

  function setPlaying(playing) {
    if (playing) {
      iconPlay.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      waveform.classList.add('active');
      artDisc.classList.add('playing');
    } else {
      iconPlay.innerHTML = '<path d="M8 5v14l11-7z"/>';
      waveform.classList.remove('active');
      artDisc.classList.remove('playing');
    }
  }

  btnPlay.addEventListener('click', () => {
    if (!audio.src) return;
    if (audio.paused) {
      audio.play().catch(e => showError('Could not play audio. Make sure the Google Drive link is a direct download URL.'));
    } else {
      audio.pause();
    }
  });

  document.getElementById('btnRestart').addEventListener('click', () => {
    audio.currentTime = 0;
    audio.play().catch(() => {});
  });

  document.getElementById('btnMute').addEventListener('click', function() {
    audio.muted = !audio.muted;
    this.textContent = audio.muted ? '🔇' : '🔊';
  });

  volumeSlider.addEventListener('input', () => {
    audio.volume = volumeSlider.value;
  });

  audio.addEventListener('play', () => setPlaying(true));
  audio.addEventListener('pause', () => setPlaying(false));
  audio.addEventListener('ended', () => setPlaying(false));

  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      const pct = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = pct + '%';
      timeElapsed.textContent = formatTime(audio.currentTime);
    }
  });

  audio.addEventListener('loadedmetadata', () => {
    timeDuration.textContent = formatTime(audio.duration);
  });

  audio.addEventListener('error', () => {
    showError('Could not load audio. Make sure the Google Drive share link is set to "Anyone with the link can view" and is a direct audio URL.');
  });

  progressTrack.addEventListener('click', (e) => {
    if (!audio.duration) return;
    const rect = progressTrack.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  });

  function showError(msg) {
    errorMsg.style.display = 'block';
    errorMsg.textContent = msg;
  }
</script>
</body>
</html>
